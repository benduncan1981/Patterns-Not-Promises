<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Relationship Reality Check – Patterns & Load Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --bg: #050510;
      --card: #141428;
      --accent: #ff7ad9;
      --accent-soft: rgba(255, 122, 217, 0.15);
      --text: #f5f5ff;
      --muted: #a0a0c0;
      --danger: #ff5c7a;
      --ok: #7dffb3;
      --border: #2a2a4a;
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.6);
      --radius-lg: 18px;
      --radius-sm: 10px;
    }

    * {
      box-sizing: border-box;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
        "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      background: radial-gradient(circle at top, #1a1630 0, #050510 55%, #020208 100%);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    .app-shell {
      max-width: 960px;
      margin: 0 auto;
      padding: 16px 16px 40px;
    }

    header {
      padding: 16px 18px 14px;
      border-radius: 0 0 var(--radius-lg) var(--radius-lg);
      background: linear-gradient(135deg, #2a1b4a, #141428);
      box-shadow: var(--shadow);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 {
      margin: 0 0 4px;
      font-size: 1.4rem;
      letter-spacing: 0.03em;
    }

    header p {
      margin: 0;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .pill {
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 0.75rem;
      color: var(--muted);
      background: rgba(0, 0, 0, 0.2);
    }

    .pill strong {
      color: var(--accent);
      font-weight: 600;
    }

    .card {
      margin-top: 18px;
      padding: 16px 16px 18px;
      border-radius: var(--radius-lg);
      background: radial-gradient(circle at top left, #26224a 0, #141428 40%, #090918 100%);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    .card h2 {
      margin: 0 0 6px;
      font-size: 1.1rem;
    }

    .card p {
      margin: 0 0 10px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .section-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .mode-toggle {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .mode-btn {
      flex: 1;
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.2);
      color: var(--muted);
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.15s ease-out;
    }

    .mode-btn.active {
      background: linear-gradient(135deg, var(--accent), #ffc46b);
      color: #1a1024;
      border-color: transparent;
      font-weight: 600;
    }

    .question {
      margin-top: 12px;
      padding: 10px 10px 12px;
      border-radius: var(--radius-sm);
      background: rgba(5, 5, 20, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.04);
    }

    .question-label {
      font-size: 0.9rem;
      margin-bottom: 6px;
    }

    .question-help {
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 4px;
    }

    .option-btn {
      width: 100%;
      text-align: left;
      padding: 7px 9px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      background: rgba(10, 10, 30, 0.8);
      color: var(--text);
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.12s ease-out;
    }

    .option-btn.selected {
      background: var(--accent-soft);
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(255, 122, 217, 0.4);
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
    }

    .slider-row input[type="range"] {
      flex: 1;
      accent-color: var(--accent);
    }

    .slider-value {
      min-width: 32px;
      text-align: right;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 4px;
    }

    .chip {
      padding: 4px 9px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 0.8rem;
      background: rgba(10, 10, 30, 0.8);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.12s ease-out;
    }

    .chip.selected {
      background: var(--accent-soft);
      color: var(--text);
      border-color: var(--accent);
    }

    .nav-row {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-top: 14px;
    }

    .nav-btn {
      flex: 1;
      padding: 9px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.4);
      color: var(--text);
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.15s ease-out;
    }

    .nav-btn.primary {
      background: linear-gradient(135deg, var(--accent), #ffc46b);
      color: #1a1024;
      border-color: transparent;
      font-weight: 600;
    }

    .nav-btn:disabled {
      opacity: 0.4;
      cursor: default;
    }

    .progress {
      margin-top: 8px;
      font-size: 0.78rem;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .progress-bar {
      margin-top: 4px;
      width: 100%;
      height: 4px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), #ffc46b);
      transition: width 0.2s ease-out;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 7px;
      border-radius: 999px;
      font-size: 0.7rem;
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: var(--muted);
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: var(--accent);
    }

    .summary-card {
      margin-top: 10px;
      padding: 10px 10px 12px;
      border-radius: var(--radius-sm);
      background: rgba(5, 5, 20, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.06);
      font-size: 0.85rem;
    }

    .summary-card h3 {
      margin: 0 0 4px;
      font-size: 0.95rem;
    }

    .summary-tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 4px;
    }

    .summary-tag {
      padding: 2px 7px;
      border-radius: 999px;
      font-size: 0.7rem;
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--muted);
    }

    .summary-tag.gap {
      border-color: var(--danger);
      color: var(--danger);
    }

    .summary-tag.align {
      border-color: var(--ok);
      color: var(--ok);
    }

    .export-area textarea {
      width: 100%;
      min-height: 160px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(5, 5, 20, 0.9);
      color: var(--text);
      padding: 8px;
      font-size: 0.78rem;
      resize: vertical;
    }

    .export-btn {
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.4);
      color: var(--text);
      font-size: 0.8rem;
      cursor: pointer;
      margin-top: 6px;
      margin-right: 6px;
    }

    @media (max-width: 600px) {
      header {
        border-radius: 0 0 14px 14px;
      }
      .card {
        border-radius: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header>
      <h1>Relationship Reality Check</h1>
      <p>Two nervous systems. One relationship. Map how bad it feels, and why.</p>
      <div class="pill-row">
        <div class="pill"><strong>ND-aware</strong> ADHD · PDA · RSD · Autism · Trauma · PMDD</div>
        <div class="pill">Local-only · No logins · Export report for AI</div>
      </div>
    </header>
    <main id="app"></main>
  </div>

  <script>
    const STORAGE_KEY = "relationship_reality_check_v1";

    const USERS = [
      { id: "self", label: "You" },
      { id: "partner", label: "Partner" }
    ];

    const SECTIONS = [
      { id: "mode", title: "Start", kind: "mode" },
      { id: "values", title: "What you say you want", kind: "questions" },
      { id: "reality", title: "What actually happens", kind: "questions" },
      { id: "blockers", title: "What hijacks connection", kind: "questions" },
      { id: "load", title: "Life load that crushes the relationship", kind: "questions" },
      { id: "safety", title: "Safety, fear, and shutdown", kind: "questions" },
      { id: "intimacy", title: "Intimacy & closeness", kind: "questions" },
      { id: "summary", title: "Summary & export", kind: "summary" }
    ];

    const QUESTIONS = {
      values: [
        {
          id: "v_partner_importance",
          type: "slider",
          label: "How central is this relationship to your sense of a good life?",
          min: 0, max: 10
        },
        {
          id: "v_child_importance",
          type: "slider",
          label: "How central is being a good parent (if applicable) to your sense of a good life?",
          min: 0, max: 10
        },
        {
          id: "v_work_importance",
          type: "slider",
          label: "How central is work/career to your sense of a good life?",
          min: 0, max: 10
        },
        {
          id: "v_autonomy_importance",
          type: "slider",
          label: "How central is having enough autonomy/alone time?",
          min: 0, max: 10
        },
        {
          id: "v_stability_importance",
          type: "slider",
          label: "How central is feeling emotionally safe and stable with your partner?",
          min: 0, max: 10
        }
      ],
      reality: [
        {
          id: "r_time_together",
          type: "slider",
          label: "In a typical week, how often do you have intentional time together (even 20–30 minutes)?",
          min: 0, max: 10
        },
        {
          id: "r_quality_time_feel",
          type: "single",
          label: "When you do spend time together, it usually feels:",
          options: [
            { id: "connected", label: "Connected and close" },
            { id: "flat", label: "Flat or distant" },
            { id: "tense", label: "Tense or fragile" },
            { id: "functional", label: "Functional (logistics, parenting, admin)" }
          ]
        },
        {
          id: "r_priority_under_stress",
          type: "single",
          label: "When life is overwhelming, what usually gets sacrificed first?",
          options: [
            { id: "partner", label: "Time/energy for the relationship" },
            { id: "child", label: "Time/energy for the child" },
            { id: "self", label: "Your own rest/needs" },
            { id: "work", label: "Work/obligations" }
          ]
        },
        {
          id: "r_feel_on_same_team",
          type: "slider",
          label: "How often do you feel like you’re on the same team?",
          min: 0, max: 10
        }
      ],
      blockers: [
        {
          id: "b_rsd_level",
          type: "slider",
          label: "Fear of rejection/being the problem (RSD) affects how you show up in the relationship.",
          min: 0, max: 10
        },
        {
          id: "b_pda_level",
          type: "slider",
          label: "Feeling pressured or expected to connect makes you want to avoid or shut down (PDA).",
          min: 0, max: 10
        },
        {
          id: "b_trauma_level",
          type: "slider",
          label: "Past experiences (trauma, betrayal, family, medical) make it hard to feel safe in this relationship.",
          min: 0, max: 10
        },
        {
          id: "b_sensory_level",
          type: "slider",
          label: "Sensory overload (noise, clutter, chaos) makes it hard to be present with your partner.",
          min: 0, max: 10
        },
        {
          id: "b_conflict_style",
          type: "single",
          label: "In conflict, you usually:",
          options: [
            { id: "pursue", label: "Pursue (push to talk/fix)" },
            { id: "withdraw", label: "Withdraw (shut down/avoid)" },
            { id: "swing", label: "Swing between both" }
          ]
        }
      ],
      load: [
        {
          id: "l_medical_load",
          type: "slider",
          label: "Medical/mental health stuff (yours or theirs) eats into your capacity for the relationship.",
          min: 0, max: 10
        },
        {
          id: "l_system_load",
          type: "slider",
          label: "Systems (NHS, work, legal, benefits, school) eat into your capacity for the relationship.",
          min: 0, max: 10
        },
        {
          id: "l_parenting_load",
          type: "slider",
          label: "Parenting load (including ND kids) eats into your capacity for the relationship.",
          min: 0, max: 10
        },
        {
          id: "l_house_load",
          type: "slider",
          label: "House/repairs/clutter/unsafe-feeling environment eats into your capacity for the relationship.",
          min: 0, max: 10
        },
        {
          id: "l_money_load",
          type: "slider",
          label: "Money/financial stress eats into your capacity for the relationship.",
          min: 0, max: 10
        },
        {
          id: "l_emotional_labour",
          type: "single",
          label: "Who carries most of the emotional/mental load for the relationship and family?",
          options: [
            { id: "me", label: "Mostly me" },
            { id: "partner", label: "Mostly my partner" },
            { id: "shared", label: "Roughly shared" },
            { id: "nobody", label: "Nobody really carries it; things just happen or don’t" }
          ]
        }
      ],
      safety: [
        {
          id: "s_emotional_safety",
          type: "slider",
          label: "Right now, how emotionally safe do you feel in this relationship?",
          min: 0, max: 10
        },
        {
          id: "s_fear_blame",
          type: "slider",
          label: "How often do you feel like you’re being blamed or seen as the problem?",
          min: 0, max: 10
        },
        {
          id: "s_fear_abandonment",
          type: "slider",
          label: "How strong is your fear that this relationship might not survive as things are?",
          min: 0, max: 10
        },
        {
          id: "s_follow_deescalation",
          type: "single",
          label: "When things escalate, how often do agreed de-escalation strategies actually get followed?",
          options: [
            { id: "often", label: "Often" },
            { id: "sometimes", label: "Sometimes" },
            { id: "rarely", label: "Rarely" },
            { id: "never", label: "Almost never" }
          ]
        }
      ],
      intimacy: [
        {
          id: "i_emotional_closeness",
          type: "slider",
          label: "How emotionally close do you currently feel to your partner?",
          min: 0, max: 10
        },
        {
          id: "i_physical_closeness",
          type: "slider",
          label: "How physically close/intimate do you currently feel (cuddling, sex, affection, etc.)?",
          min: 0, max: 10
        },
        {
          id: "i_initiation_feel",
          type: "single",
          label: "When your partner wants closeness, it usually feels like:",
          options: [
            { id: "invitation", label: "A warm invitation" },
            { id: "pressure", label: "Pressure or expectation" },
            { id: "demand", label: "A demand you want to avoid" },
            { id: "depends", label: "It depends on your state" }
          ]
        },
        {
          id: "i_shut_down_reasons",
          type: "multi",
          label: "Biggest things that shut down your desire for closeness are:",
          options: [
            { id: "criticised", label: "Feeling criticised or judged" },
            { id: "unsafe", label: "Feeling unsafe, braced, or on edge" },
            { id: "task", label: "Feeling like a task or obligation" },
            { id: "overload", label: "Sensory overload / too much input" },
            { id: "resentment", label: "Unspoken resentment or disappointment" }
          ]
        }
      ]
    };

    let state = loadState() || {
      mode: "couple",
      currentSectionIndex: 0,
      currentUserIndex: 0,
      answers: { self: {}, partner: {} }
    };

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return null;
        return JSON.parse(raw);
      } catch {
        return null;
      }
    }

    function saveState() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      } catch {}
    }

    function resetState() {
      state = {
        mode: "couple",
        currentSectionIndex: 0,
        currentUserIndex: 0,
        answers: { self: {}, partner: {} }
      };
      saveState();
      render();
    }

    function getActiveUsers() {
      return state.mode === "solo" ? [USERS[0]] : USERS;
    }

    function getCurrentUser() {
      return getActiveUsers()[state.currentUserIndex];
    }

    function setAnswer(userId, qid, value) {
      if (!state.answers[userId]) state.answers[userId] = {};
      state.answers[userId][qid] = value;
      saveState();
    }

    function getAnswer(userId, qid, fallback = null) {
      return state.answers[userId]?.[qid] ?? fallback;
    }

    function nextSection() {
      if (SECTIONS[state.currentSectionIndex].id === "summary") return;
      state.currentSectionIndex++;
      if (SECTIONS[state.currentSectionIndex].kind === "questions") {
        state.currentUserIndex = 0;
      }
      saveState();
      render();
    }

    function prevSection() {
      if (state.currentSectionIndex === 0) return;
      state.currentSectionIndex--;
      if (SECTIONS[state.currentSectionIndex].kind === "questions") {
        state.currentUserIndex = 0;
      }
      saveState();
      render();
    }

    function nextUserOrSection() {
      const users = getActiveUsers();
      if (users.length === 1) {
        nextSection();
        return;
      }
      if (state.currentUserIndex < users.length - 1) {
        state.currentUserIndex++;
        saveState();
        render();
      } else {
        state.currentUserIndex = 0;
        nextSection();
      }
    }

    function prevUserOrSection() {
      const users = getActiveUsers();
      if (users.length === 1) {
        prevSection();
        return;
      }
      if (state.currentUserIndex > 0) {
        state.currentUserIndex--;
        saveState();
        render();
      } else {
        prevSection();
        const usersAfter = getActiveUsers();
        state.currentUserIndex = Math.max(0, usersAfter.length - 1);
        saveState();
        render();
      }
    }

    function computeScoresForUser(userId) {
      const a = state.answers[userId] || {};
      const scores = {
        values_partner: (a["v_partner_importance"] || 0),
        values_safety: (a["v_stability_importance"] || 0),
        reality_time: (a["r_time_together"] || 0),
        reality_team: (a["r_feel_on_same_team"] || 0),
        blockers_rsd: (a["b_rsd_level"] || 0),
        blockers_pda: (a["b_pda_level"] || 0),
        blockers_trauma: (a["b_trauma_level"] || 0),
        blockers_sensory: (a["b_sensory_level"] || 0),
        load_medical: (a["l_medical_load"] || 0),
        load_system: (a["l_system_load"] || 0),
        load_parenting: (a["l_parenting_load"] || 0),
        load_house: (a["l_house_load"] || 0),
        load_money: (a["l_money_load"] || 0),
        safety_feel: (a["s_emotional_safety"] || 0),
        safety_blame: (a["s_fear_blame"] || 0),
        safety_fear_end: (a["s_fear_abandonment"] || 0),
        intimacy_emotional: (a["i_emotional_closeness"] || 0),
        intimacy_physical: (a["i_physical_closeness"] || 0)
      };
      return scores;
    }

    function buildNarrative(userId, label) {
      const a = state.answers[userId] || {};
      const s = computeScoresForUser(userId);

      const lines = [];
      lines.push(`User: ${label}`);
      lines.push("");

      const wantsPartnerHigh = s.values_partner >= 7;
      const timeLow = s.reality_time <= 3;
      const teamLow = s.reality_team <= 4;
      const emoLow = s.intimacy_emotional <= 4;
      const physLow = s.intimacy_physical <= 4;

      if (wantsPartnerHigh && (timeLow || emoLow || physLow)) {
        lines.push("You rate this relationship as very important, but in reality it’s getting very little time, closeness, or energy.");
      } else if (wantsPartnerHigh) {
        lines.push("You rate this relationship as very important, and some of that does show up in reality.");
      } else {
        lines.push("You don’t rate the relationship as your absolute top priority right now, which may reflect how overloaded you are.");
      }

      const totalLoad = s.load_medical + s.load_system + s.load_parenting + s.load_house + s.load_money;
      if (totalLoad >= 25) {
        lines.push("Your life load (medical, systems, parenting, house, money) is extremely high. It would be surprising if the relationship didn’t feel crushed under this.");
      } else if (totalLoad >= 15) {
        lines.push("Your life load is heavy and clearly eats into what you have left for the relationship.");
      }

      if (s.blockers_rsd >= 7) {
        lines.push("Fear of rejection or being the problem (RSD) is a major driver in how you experience this relationship.");
      }
      if (s.blockers_pda >= 7) {
        lines.push("Feeling pressured or expected to connect (PDA) makes you want to avoid or shut down a lot of the time.");
      }
      if (s.blockers_trauma >= 7) {
        lines.push("Past experiences and trauma make it hard for your nervous system to believe this relationship is safe.");
      }
      if (s.blockers_sensory >= 7) {
        lines.push("Sensory overload and chaos make it very hard for you to be present with your partner.");
      }

      if (s.safety_feel <= 4) {
        lines.push("You do not currently feel emotionally safe in this relationship.");
      } else if (s.safety_feel <= 6) {
        lines.push("Your sense of emotional safety here is fragile and easily shaken.");
      }

      if (s.safety_blame >= 7) {
        lines.push("You often feel blamed or seen as the problem, which will make you defensive, shut down, or over-explain.");
      }

      if (s.safety_fear_end >= 7) {
        lines.push("You are strongly afraid this relationship might not survive as things are. That fear alone is a huge load.");
      }

      const shut = a["i_shut_down_reasons"] || [];
      if (shut.length) {
        lines.push("");
        lines.push("Things that reliably shut down your desire for closeness:");
        shut.forEach(id => {
          const opt = QUESTIONS.intimacy.find(q => q.id === "i_shut_down_reasons")
            .options.find(o => o.id === id);
          if (opt) lines.push(`- ${opt.label}`);
        });
      }

      return lines.join("\n");
    }

    function buildCombinedSummary() {
      const users = getActiveUsers();
      const selfScores = computeScoresForUser("self");
      const partnerScores = users.length === 2 ? computeScoresForUser("partner") : null;

      const lines = [];
      lines.push("=== RELATIONSHIP REALITY CHECK – COMBINED SUMMARY ===");
      lines.push("");

      if (users.length === 2) {
        const bothValuePartnerHigh =
          selfScores.values_partner >= 7 && partnerScores.values_partner >= 7;
        if (bothValuePartnerHigh) {
          lines.push("You both say this relationship really matters. That’s not the problem.");
        } else if (selfScores.values_partner >= 7 && partnerScores.values_partner < 7) {
          lines.push("You rate the relationship as central; your partner may be more split between relationship, work, autonomy, or survival.");
        } else if (selfScores.values_partner < 7 && partnerScores.values_partner >= 7) {
          lines.push("Your partner rates the relationship as central; you may be more in survival mode or emotionally checked out.");
        } else {
          lines.push("Neither of you is currently holding the relationship as the clear top priority, which usually means life load is winning.");
        }

        const selfTime = selfScores.reality_time;
        const partnerTime = partnerScores.reality_time;
        if (selfTime <= 3 && partnerTime <= 3) {
          lines.push("Both of you report very little intentional time together. The relationship is running on fumes.");
        }

        const selfSafety = selfScores.safety_feel;
        const partnerSafety = partnerScores.safety_feel;
        if (selfSafety <= 4 || partnerSafety <= 4) {
          lines.push("At least one of you does not feel emotionally safe here. That is a core problem, not a side issue.");
        }

        const selfFearEnd = selfScores.safety_fear_end;
        const partnerFearEnd = partnerScores.safety_fear_end;
        if (selfFearEnd >= 7 || partnerFearEnd >= 7) {
          lines.push("There is a strong fear that this relationship might not survive as things are. That fear needs naming, not hiding.");
        }

        const selfLoad = selfScores.load_medical + selfScores.load_system + selfScores.load_parenting + selfScores.load_house + selfScores.load_money;
        const partnerLoad = partnerScores.load_medical + partnerScores.load_system + partnerScores.load_parenting + partnerScores.load_house + partnerScores.load_money;
        if (selfLoad >= 20 || partnerLoad >= 20) {
          lines.push("Life load for at least one of you is at ‘no spare capacity’ levels. The relationship is competing with survival tasks.");
        }

        const selfRSD = selfScores.blockers_rsd;
        const partnerPDA = partnerScores.blockers_pda;
        if (selfRSD >= 7 && partnerPDA >= 7) {
          lines.push("Pattern: one of you is terrified of rejection and being the problem; the other is terrified of pressure and being demanded from. This is a perfect storm: reaching out feels risky to one and suffocating to the other.");
        }
      } else {
        lines.push("Solo mode: this is your view of the relationship and the load around it.");
      }

      lines.push("");
      lines.push("=== INDIVIDUAL NERVOUS SYSTEM PROFILES ===");
      lines.push("");
      lines.push(buildNarrative("self", "You"));
      if (users.length === 2) {
        lines.push("");
        lines.push(buildNarrative("partner", "Partner"));
      }

      lines.push("");
      lines.push("=== TINY LEVERS (NOT FIXES, JUST PRESSURE RELEASE VALVES) ===");
      lines.push("");
      lines.push("- Protect one small window (20–30 minutes) a week where the only rule is: no fixing, no feedback, no logistics. Just co-exist kindly.");
      lines.push("- When you notice RSD or PDA or trauma kicking off, name the state (“my rejection brain is loud”, “my pressure brain is loud”) instead of accusing each other.");
      lines.push("- If both of you are overloaded, treat the relationship as something to be protected from the load, not another task added on top of it.");

      return lines.join("\n");
    }

    function render() {
      const app = document.getElementById("app");
      const section = SECTIONS[state.currentSectionIndex];

      if (section.kind === "mode") {
        app.innerHTML = renderModeSection();
      } else if (section.kind === "questions") {
        app.innerHTML = renderQuestionSection(section);
      } else if (section.kind === "summary") {
        app.innerHTML = renderSummarySection();
      }

      attachEvents();
      updateProgress();
    }

    function renderModeSection() {
      return `
        <div class="card">
          <div class="section-label">Step 1</div>
          <h2>How are you using this?</h2>
          <p>Answer honestly, not aspirationally. This is about what’s actually happening, not what you wish was happening.</p>
          <div class="mode-toggle">
            <button class="mode-btn ${state.mode === "solo" ? "active" : ""}" data-mode="solo">
              Solo<br /><span>Just your view</span>
            </button>
            <button class="mode-btn ${state.mode === "couple" ? "active" : ""}" data-mode="couple">
              Couple<br /><span>Two separate passes, one combined summary</span>
            </button>
          </div>
          <div class="nav-row" style="margin-top:16px;">
            <button class="nav-btn" id="reset-btn">Reset</button>
            <button class="nav-btn primary" id="mode-next-btn">Begin</button>
          </div>
          <div class="progress">
            <span>Progress</span>
            <span>0%</span>
          </div>
          <div class="progress-bar"><div class="progress-fill" style="width:0%;"></div></div>
        </div>
      `;
    }

    function sectionDescription(id) {
      switch (id) {
        case "values":
          return "What you say you want from this relationship and your life.";
        case "reality":
          return "What actually happens when time, energy, and stress are real.";
        case "blockers":
          return "What your nervous system does that hijacks connection.";
        case "load":
          return "The life load that quietly crushes your capacity for the relationship.";
        case "safety":
          return "How safe, blamed, or at-risk this relationship feels from the inside.";
        case "intimacy":
          return "How close you actually feel, and what shuts that down.";
        default:
          return "";
      }
    }

    function renderQuestionSection(section) {
      const user = getCurrentUser();
      const questions = QUESTIONS[section.id] || [];
      const users = getActiveUsers();
      const userLabel = state.mode === "solo"
        ? "You"
        : user.id === "self"
        ? "You"
        : "Partner";

      const questionsHtml = questions.map(q => renderQuestion(user.id, q)).join("");

      return `
        <div class="card">
          <div class="section-label">${section.title}</div>
          <h2>${section.title}</h2>
          <p>${sectionDescription(section.id)}</p>
          <div style="margin-bottom:8px;">
            <span class="badge"><span class="badge-dot"></span>${userLabel}</span>
          </div>
          ${questionsHtml}
          <div class="nav-row">
            <button class="nav-btn" id="prev-btn">← Back</button>
            <button class="nav-btn primary" id="next-btn">${
              users.length === 2 && state.currentUserIndex === 0 ? "Next: partner →" : "Next →"
            }</button>
          </div>
          <div class="progress">
            <span>Progress</span>
            <span>0%</span>
          </div>
          <div class="progress-bar"><div class="progress-fill" style="width:0%;"></div></div>
        </div>
      `;
    }

    function renderQuestion(userId, q) {
      const answer = getAnswer(userId, q.id);
      if (q.type === "slider") {
        const val = answer ?? 5;
        return `
          <div class="question">
            <div class="question-label">${q.label}</div>
            <div class="slider-row">
              <input type="range" min="${q.min}" max="${q.max}" value="${val}" data-qid="${q.id}" class="slider-input" />
              <div class="slider-value">${val}</div>
            </div>
          </div>
        `;
      }
      if (q.type === "single") {
        return `
          <div class="question">
            <div class="question-label">${q.label}</div>
            <div class="options">
              ${q.options
                .map(opt => {
                  const selected = answer === opt.id ? "selected" : "";
                  return `<button class="option-btn ${selected}" data-qid="${q.id}" data-optid="${opt.id}">${opt.label}</button>`;
                })
                .join("")}
            </div>
          </div>
        `;
      }
      if (q.type === "multi") {
        const selected = Array.isArray(answer) ? answer : [];
        return `
          <div class="question">
            <div class="question-label">${q.label}</div>
            <div class="chips">
              ${q.options
                .map(opt => {
                  const isSel = selected.includes(opt.id) ? "selected" : "";
                  return `<button class="chip ${isSel}" data-qid="${q.id}" data-optid="${opt.id}">${opt.label}</button>`;
                })
                .join("")}
            </div>
          </div>
        `;
      }
      return "";
    }

    function renderSummarySection() {
      const users = getActiveUsers();
      const combinedText = buildCombinedSummary();

      return `
        <div class="card">
          <div class="section-label">Summary & export</div>
          <h2>What this is actually saying</h2>
          <p>This is not a verdict. It’s a snapshot of how bad it feels, why it feels that bad, and where the pressure is coming from.</p>
          <div class="summary-card export-area">
            <h3>Copy-paste report (for you, or for an AI)</h3>
            <textarea id="export-text">${combinedText}</textarea>
            <button class="export-btn" id="copy-btn">Copy to clipboard</button>
          </div>
          <div class="nav-row" style="margin-top:14px;">
            <button class="nav-btn" id="summary-back-btn">← Back</button>
            <button class="nav-btn primary" id="reset-btn">Start over</button>
          </div>
          <div class="progress">
            <span>Progress</span>
            <span>100%</span>
          </div>
          <div class="progress-bar"><div class="progress-fill" style="width:100%;"></div></div>
        </div>
      `;
    }

    function updateProgress() {
      const bar = document.querySelector(".progress-fill");
      const label = document.querySelector(".progress span:last-child");
      if (!bar || !label) return;

      const section = SECTIONS[state.currentSectionIndex];
      if (section.kind === "mode") {
        bar.style.width = "0%";
        label.textContent = "0%";
        return;
      }
      if (section.kind === "summary") {
        bar.style.width = "100%";
        label.textContent = "100%";
        return;
      }

      const totalQuestionSections = SECTIONS.filter(s => s.kind === "questions").length;
      const currentIndexAmongQuestions = SECTIONS
        .filter(s => s.kind === "questions")
        .findIndex(s => s.id === section.id);
      const pct = ((currentIndexAmongQuestions + 1) / totalQuestionSections) * 100;
      bar.style.width = pct + "%";
      label.textContent = Math.round(pct) + "%";
    }

    function attachEvents() {
      document.querySelectorAll(".mode-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          const mode = btn.getAttribute("data-mode");
          state.mode = mode;
          saveState();
          render();
        });
      });

      const modeNext = document.getElementById("mode-next-btn");
      if (modeNext) {
        modeNext.addEventListener("click", () => {
          state.currentSectionIndex = 1;
          state.currentUserIndex = 0;
          saveState();
          render();
        });
      }

      const resetBtn = document.getElementById("reset-btn");
      if (resetBtn) {
        resetBtn.addEventListener("click", () => {
          if (confirm("Reset all answers and start again?")) {
            resetState();
          }
        });
      }

      const prevBtn = document.getElementById("prev-btn");
      if (prevBtn) {
        prevBtn.addEventListener("click", () => {
          prevUserOrSection();
        });
      }

      const nextBtn = document.getElementById("next-btn");
      if (nextBtn) {
        nextBtn.addEventListener("click", () => {
          const isLastQuestionSection =
            SECTIONS[state.currentSectionIndex + 1]?.kind === "summary";
          const users = getActiveUsers();
          if (isLastQuestionSection && (state.mode === "solo" || (state.mode === "couple" && state.currentUserIndex === users.length - 1))) {
            state.currentSectionIndex++;
            state.currentUserIndex = 0;
            saveState();
            render();
          } else {
            nextUserOrSection();
          }
        });
      }

      const summaryBack = document.getElementById("summary-back-btn");
      if (summaryBack) {
        summaryBack.addEventListener("click", () => {
          state.currentSectionIndex = SECTIONS.findIndex(s => s.id === "intimacy");
          state.currentUserIndex = 0;
          saveState();
          render();
        });
      }

      document.querySelectorAll(".slider-input").forEach(slider => {
        slider.addEventListener("input", () => {
          const qid = slider.getAttribute("data-qid");
          const val = Number(slider.value);
          const user = getCurrentUser();
          setAnswer(user.id, qid, val);
          const valueLabel = slider.parentElement.querySelector(".slider-value");
          if (valueLabel) valueLabel.textContent = val;
        });
      });

      document.querySelectorAll(".option-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          const qid = btn.getAttribute("data-qid");
          const optid = btn.getAttribute("data-optid");
          const user = getCurrentUser();
          setAnswer(user.id, qid, optid);
          document
            .querySelectorAll(`.option-btn[data-qid="${qid}"]`)
            .forEach(b => b.classList.remove("selected"));
          btn.classList.add("selected");
        });
      });

      document.querySelectorAll(".chip").forEach(chip => {
        chip.addEventListener("click", () => {
          const qid = chip.getAttribute("data-qid");
          const optid = chip.getAttribute("data-optid");
          const user = getCurrentUser();
          const current = getAnswer(user.id, qid, []);
          let next;
          if (current.includes(optid)) {
            next = current.filter(x => x !== optid);
          } else {
            next = [...current, optid];
          }
          setAnswer(user.id, qid, next);
          chip.classList.toggle("selected");
        });
      });

      const copyBtn = document.getElementById("copy-btn");
      if (copyBtn) {
        copyBtn.addEventListener("click", () => {
          const ta = document.getElementById("export-text");
          ta.select();
          document.execCommand("copy");
          copyBtn.textContent = "Copied";
          setTimeout(() => (copyBtn.textContent = "Copy to clipboard"), 1500);
        });
      }
    }

    render();
  </script>
</body>
</html>
